<style>
  /* Self-contained so it renders correctly even at a mistyped deep URL where relative assets would not load. */
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#15171c;color:#d7dae0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:48px 24px}

  .nf-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:'Oswald',sans-serif;text-transform:uppercase;font-weight:600;letter-spacing:1px;font-size:15px;padding:15px 28px;border-radius:6px;border:2px solid transparent;transition:.2s}
  .btn-primary{background:#E9531F;color:#fff}
  .btn-primary:hover{background:#c8430f}
  .btn-outline{background:transparent;color:#fff;border-color:rgba(255,255,255,.5)}
